<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 かわいい家計簿 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&family=Kaisei+Tokumin:wght@400;700&family=M+PLUS+Rounded+1c:wght@300;400;700&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
/* ===== CSS変数 ===== */
:root {
  --bg: #fff5f7;
  --bg2: #fff0f3;
  --primary: #f8a0b0;
  --primary-dark: #e07090;
  --primary-light: #ffd6df;
  --accent: #f06080;
  --surface: #ffffff;
  --surface2: #fff8f9;
  --border: #f8c0cc;
  --text: #5a3a40;
  --text-light: #9a7080;
  --text-muted: #c0a0a8;
  --income-color: #60b060;
  --expense-color: #e06070;
  --shadow: 0 4px 20px rgba(240,96,128,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Zen Maru Gothic', sans-serif;
  --font-size: 14px;
}
/* テーマ: スカイブルー */
[data-theme="skyblue"] {
  --bg: #f0f8ff; --bg2: #e8f4ff; --primary: #80c0e8;
  --primary-dark: #4090c0; --primary-light: #c0e0f8; --accent: #3080c0;
  --surface: #ffffff; --surface2: #f5faff; --border: #b0d8f0;
  --text: #1a3a5a; --text-light: #4a6a8a; --text-muted: #90b0c8;
  --shadow: 0 4px 20px rgba(64,144,192,0.12);
}
/* テーマ: ライトイエロー */
[data-theme="yellow"] {
  --bg: #fffdf0; --bg2: #fffae0; --primary: #f0d060;
  --primary-dark: #c8a820; --primary-light: #fff0a0; --accent: #c09000;
  --surface: #ffffff; --surface2: #fffdf5; --border: #f0e090;
  --text: #3a3000; --text-light: #6a5800; --text-muted: #b0a060;
  --shadow: 0 4px 20px rgba(200,168,32,0.12);
}
/* テーマ: ライトパープル */
[data-theme="purple"] {
  --bg: #f8f0ff; --bg2: #f2e8ff; --primary: #c090e8;
  --primary-dark: #9060c0; --primary-light: #e0c8f8; --accent: #8040b0;
  --surface: #ffffff; --surface2: #fcf8ff; --border: #d8b8f0;
  --text: #2a1040; --text-light: #604080; --text-muted: #b090c8;
  --shadow: 0 4px 20px rgba(144,96,192,0.12);
}
/* テーマ: ライトブラウン */
[data-theme="brown"] {
  --bg: #fdf8f0; --bg2: #faf3e8; --primary: #d0a870;
  --primary-dark: #a07840; --primary-light: #f0dfc0; --accent: #805028;
  --surface: #ffffff; --surface2: #fefcf8; --border: #e0c8a0;
  --text: #3a2010; --text-light: #6a4828; --text-muted: #b09070;
  --shadow: 0 4px 20px rgba(160,120,64,0.12);
}
/* フォント設定 */
[data-font="cute"] { --font: 'Zen Maru Gothic', sans-serif; }
[data-font="fude"] { --font: 'Kaisei Tokumin', serif; }
[data-font="gothic"] { --font: 'M PLUS Rounded 1c', sans-serif; }
[data-font="outline"] { --font: 'Kosugi Maru', sans-serif; }
[data-font="bold"] { --font: 'M PLUS Rounded 1c', sans-serif; --font-size: 15px; font-weight: 700; }
[data-font="thin"] { --font: 'M PLUS Rounded 1c', sans-serif; --font-size: 13px; font-weight: 300; }

/* ===== リセット & 基本 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  font-size: var(--font-size);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
/* 背景イラスト（草木・猫） */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 200px 300px at 5% 20%, rgba(144,200,100,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 150px 250px at 95% 70%, rgba(144,200,100,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 120px 180px at 50% 90%, rgba(144,200,100,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.nature-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.nature-bg svg { position: absolute; opacity: 0.06; }

/* ===== ヘッダー ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 2px solid var(--primary-light);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.header-title {
  flex: 1;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  gap: 6px;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border-radius: 24px;
  padding: 4px 12px;
  border: 1.5px solid var(--border);
}
.month-nav button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--primary-dark);
  font-size: 18px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.month-nav button:hover { background: var(--primary-light); }
.month-label { font-size: 15px; font-weight: 700; color: var(--text); min-width: 90px; text-align: center; }
.hamburger-btn {
  background: var(--primary-light);
  border: none;
  border-radius: 10px;
  width: 38px; height: 38px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: background 0.2s;
}
.hamburger-btn:hover { background: var(--primary); }
.hamburger-btn span { display: block; width: 20px; height: 2px; background: var(--primary-dark); border-radius: 2px; }

/* ===== メインコンテンツ ===== */
.main-content {
  max-width: 500px;
  margin: 0 auto;
  padding: 16px 12px 80px;
  position: relative;
  z-index: 1;
}

/* ===== サマリーカード ===== */
.summary-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.summary-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  text-align: center;
}
.summary-card.balance { grid-column: 1 / -1; background: linear-gradient(135deg, var(--primary-light), var(--bg)); }
.summary-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.summary-amount {
  font-size: 20px;
  font-weight: 700;
}
.summary-amount.positive { color: var(--income-color); }
.summary-amount.negative { color: var(--expense-color); }
.summary-amount.neutral { color: var(--text); }
.summary-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ===== 予定バー ===== */
.forecast-bar {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px;
  border: 1.5px solid var(--border);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.forecast-title {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.forecast-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.forecast-row:last-child { margin-bottom: 0; }
.forecast-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.forecast-tag.income { background: rgba(96,176,96,0.15); color: var(--income-color); }
.forecast-tag.expense { background: rgba(224,96,112,0.15); color: var(--expense-color); }
.forecast-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg2);
  color: var(--text);
  outline: none;
  text-align: right;
}
.forecast-input:focus { border-color: var(--primary); }

/* ===== カレンダー ===== */
.calendar-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 14px;
}
.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--primary-light);
  border-bottom: 1.5px solid var(--border);
}
.cal-dow {
  text-align: center;
  padding: 8px 2px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-light);
}
.cal-dow.sun { color: var(--expense-color); }
.cal-dow.sat { color: #4090e0; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-day {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 4px;
  min-height: 68px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:hover { background: var(--bg2); }
.cal-day.other-month .day-num { opacity: 0.3; }
.cal-day.today .day-num {
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
}
.cal-day.selected { background: var(--primary-light); }
.day-num {
  font-size: 12px;
  font-weight: 600;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2px;
}
.cal-day.sun .day-num { color: var(--expense-color); }
.cal-day.sat .day-num { color: #4090e0; }
.day-amounts { font-size: 10px; line-height: 1.4; }
.day-income { color: var(--income-color); }
.day-expense { color: var(--expense-color); }

/* ===== 月別集計 ===== */
.monthly-summary {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.ms-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ms-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 13px;
}
.ms-row:last-child { border-bottom: none; font-weight: 700; }
.ms-cat { color: var(--text-light); }
.ms-amt-income { color: var(--income-color); font-weight: 600; }
.ms-amt-expense { color: var(--expense-color); font-weight: 600; }
.ms-balance { color: var(--text); }

/* ===== カテゴリー別内訳 ===== */
.category-section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.cat-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: var(--bg2);
  border-bottom: 1.5px solid var(--border);
  transition: background 0.15s;
}
.cat-header:hover { background: var(--primary-light); }
.cat-icon { font-size: 18px; }
.cat-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
.cat-total { font-size: 13px; font-weight: 700; color: var(--expense-color); }
.cat-total.income-cat { color: var(--income-color); }
.cat-toggle { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
.cat-toggle.open { transform: rotate(180deg); }
.cat-body { display: none; }
.cat-body.open { display: block; }
.cat-items { padding: 0 12px 8px; }
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; padding-top: 2px; }
.item-info { flex: 1; }
.item-name { font-size: 13px; color: var(--text); }
.item-memo { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.item-amount { font-size: 14px; font-weight: 700; color: var(--expense-color); white-space: nowrap; }
.item-amount.income-item { color: var(--income-color); }
.item-actions { display: flex; gap: 4px; }
.item-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 2px;
  border-radius: 4px;
  transition: background 0.15s;
}
.item-btn:hover { background: var(--border); }
.add-item-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 8px 12px;
  padding: 8px 12px;
  background: var(--bg2);
  border: 1.5px dashed var(--primary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--primary-dark);
  font-family: var(--font);
  transition: background 0.15s;
  width: calc(100% - 24px);
}
.add-item-btn:hover { background: var(--primary-light); }

/* ===== グラフ ===== */
.chart-section {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.chart-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-bottom: 12px; }
.chart-bars { display: flex; flex-direction: column; gap: 8px; }
.chart-row { display: flex; align-items: center; gap: 8px; }
.chart-label { font-size: 11px; color: var(--text-light); width: 60px; flex-shrink: 0; text-align: right; }
.chart-bar-wrap { flex: 1; height: 16px; background: var(--bg2); border-radius: 8px; overflow: hidden; }
.chart-bar { height: 100%; border-radius: 8px; transition: width 0.6s ease; }
.chart-val { font-size: 11px; color: var(--text-light); white-space: nowrap; }

/* ===== ハンバーガーメニュー ===== */
.hamburger-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
}
.hamburger-overlay.open { display: block; }
.hamburger-menu {
  position: fixed;
  top: 0; right: 0;
  width: 280px;
  height: 100%;
  background: var(--surface);
  box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  padding-bottom: 40px;
}
.hamburger-menu.open { transform: translateX(0); }
.hm-header {
  padding: 16px;
  background: var(--primary-light);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hm-title { font-size: 16px; font-weight: 700; color: var(--primary-dark); }
.hm-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-light); }
.hm-section { padding: 12px 16px 0; }
.hm-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
.theme-btn {
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 8px 4px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  transition: all 0.2s;
}
.theme-btn.active { border-color: var(--accent); }
.font-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.font-btn {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  text-align: left;
  background: var(--bg2);
  color: var(--text);
  transition: all 0.2s;
  font-size: 13px;
}
.font-btn.active { border-color: var(--primary); background: var(--primary-light); }
.hm-action-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 10px 14px;
  margin-bottom: 6px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text);
  text-align: left;
  transition: background 0.15s;
}
.hm-action-btn:hover { background: var(--primary-light); }

/* ===== モーダル ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px 20px 40px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 16px;
  text-align: center;
}
.modal-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  margin: 12px 0 6px;
}

/* 収支選択 */
.type-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.type-btn {
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  background: var(--bg2);
  color: var(--text-light);
  transition: all 0.2s;
}
.type-btn.income-btn.active { border-color: var(--income-color); background: rgba(96,176,96,0.1); color: var(--income-color); }
.type-btn.expense-btn.active { border-color: var(--expense-color); background: rgba(224,96,112,0.1); color: var(--expense-color); }

/* カテゴリー選択 */
.cat-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.cat-select-btn {
  padding: 10px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  text-align: center;
  background: var(--bg2);
  color: var(--text);
  transition: all 0.2s;
}
.cat-select-btn .cat-select-icon { font-size: 20px; display: block; margin-bottom: 3px; }
.cat-select-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 700; }

/* 項目選択 */
.item-select-wrap { margin-bottom: 12px; }
.item-dropdown {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg2);
  color: var(--text);
  outline: none;
  margin-bottom: 8px;
}
.item-dropdown:focus { border-color: var(--primary); }
.custom-item-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg2);
  color: var(--text);
  outline: none;
}
.custom-item-input:focus { border-color: var(--primary); }

/* 金額入力 */
.amount-display {
  font-size: 32px;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  padding: 12px;
  background: var(--bg2);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  margin-bottom: 12px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.num-btn {
  padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 18px;
  font-weight: 700;
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s;
  text-align: center;
}
.num-btn:hover { background: var(--primary-light); }
.num-btn.del-btn { color: var(--expense-color); }
.num-btn.zero-btn { grid-column: span 2; }

.memo-input {
  width: 100%;
  padding: 10px 12px;

  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg2);
  color: var(--text);
  outline: none;
  resize: none;
  height: 60px;
  margin-bottom: 14px;
}

.confirm-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  box-shadow: 0 4px 12px rgba(240,96,128,0.3);
}
.confirm-btn:hover { opacity: 0.9; }

/* ===== 予算管理ツールチップ ===== */
.budget-alert {
  padding: 10px 14px;
  background: rgba(224,96,112,0.1);
  border: 1px solid rgba(224,96,112,0.3);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--expense-color);
  margin-bottom: 14px;
  display: none;
}
.budget-alert.show { display: block; }

/* ===== ボトムアクション ===== */
.bottom-actions {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  z-index: 50;
  max-width: 500px;
  margin: 0 auto;
}
.action-btn {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg2);
  font-family: var(--font);
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: background 0.15s;
}
.action-btn:hover { background: var(--primary-light); }
.action-btn.main-action {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border-color: var(--primary-dark);
  font-weight: 700;
}
.action-btn.main-action:hover { opacity: 0.9; }

/* ===== 貯蓄目標 ===== */
.saving-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  padding: 14px;
  margin-bottom: 14px;

}
.saving-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
.saving-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.saving-label { font-size: 12px; color: var(--text-light); width: 70px; }
.saving-input {

  border: 1.5px solid var(--border);
  border-radius: 8px;

}
.saving-input:focus { border-color: var(--primary); }
.progress-wrap { margin-top: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.progress-bar { height: 10px; background: var(--bg2); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); border-radius: 5px; transition: width 0.5s; }

/* ===== 印刷スタイル ===== */
@media print {

<script>
// ===== データ定義 =====
const CATEGORIES = [
  { id: 'rent',       name: '家賃',       icon: '🏠', type: 'expense',
    items: ['家賃', '管理費', '駐車場代', 'その他'] },
  { id: 'utilities',  name: '光熱費',     icon: '💡', type: 'expense',
    items: ['電気代', 'ガス代', '水道代', 'その他'] },
  { id: 'food',       name: '食品',       icon: '🍱', type: 'expense',
    items: ['スーパー', 'コンビニ', '外食', 'デリバリー', 'カフェ', 'お菓子', 'その他'] },
  { id: 'fixed',      name: '固定費',     icon: '📌', type: 'expense',
    items: ['サブスク', 'ジム', '新聞', 'その他'] },
  { id: 'telecom',    name: '通信費',     icon: '📱', type: 'expense',
    items: ['スマホ代', 'Wi-Fi', 'ネット', 'その他'] },
  { id: 'transport',  name: '交通費',     icon: '🚃', type: 'expense',
    items: ['電車', 'バス', 'タクシー', 'ガソリン', '駐車料金', 'その他'] },
  { id: 'social',     name: '交遊費',     icon: '🎉', type: 'expense',
    items: ['飲み会', '友人プレゼント', '交際費', 'デート', 'その他'] },
  { id: 'insurance',  name: '保険その他', icon: '🛡️', type: 'expense',
    items: ['生命保険', '医療保険', '損害保険', '薬・医療費', 'その他'] },
  { id: 'event',      name: 'イベント',   icon: '🎊', type: 'expense',
    items: ['旅行', 'コンサート', '映画', '冠婚葬祭', 'その他'] },
  { id: 'income',     name: '収入',       icon: '💚', type: 'income',
    items: ['給料', 'ボーナス', 'フリーランス', '副業', 'その他'] },
  { id: 'other',      name: 'その他',     icon: '📂', type: 'both',
    items: ['その他'] },
];

const FIXED_PRESETS = [
  { catId: 'telecom', name: 'スマホ代', amount: 0 },
  { catId: 'fixed',   name: 'サブスク', amount: 0 },
];

// ===== 状態管理 =====
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();
let selectedDay = null;
let currentStep = 1;
let selectedType = null;
let selectedCatId = null;
let amountStr = '';
let records = {}; // { "2025-06": [ {id, date, type, catId, name, amount, memo} ] }
let forecasts = {}; // { "2025-06": {income: 0, expense: 0} }
let savings = {}; // { "2025-06": {goal: 0, amount: 0} }
let fixedExpenses = []; // [{catId, name, amount}]

// ===== ローカルストレージ =====
function getKey() { return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }
function loadData() {
  const r = localStorage.getItem('kakeibo_records');
  if (r) records = JSON.parse(r);
  const f = localStorage.getItem('kakeibo_forecasts');
  if (f) forecasts = JSON.parse(f);
  const s = localStorage.getItem('kakeibo_savings');
  if (s) savings = JSON.parse(s);
  const fx = localStorage.getItem('kakeibo_fixed');
  if (fx) fixedExpenses = JSON.parse(fx);
}
function saveData() {
  localStorage.setItem('kakeibo_records', JSON.stringify(records));
  localStorage.setItem('kakeibo_forecasts', JSON.stringify(forecasts));
  localStorage.setItem('kakeibo_savings', JSON.stringify(savings));
  localStorage.setItem('kakeibo_fixed', JSON.stringify(fixedExpenses));
}
function getRecords() { return records[getKey()] || []; }
function setRecords(list) { records[getKey()] = list; }

// ===== 数値フォーマット =====
function fmt(n) { return '¥' + Math.abs(n).toLocaleString(); }

// ===== サマリー更新 =====
function updateSummary() {
  const list = getRecords();
  let income = 0, expense = 0;
  list.forEach(r => {
    if (r.type === 'income') income += r.amount;
    else expense += r.amount;
  });
  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('balance');
  balEl.textContent = (bal >= 0 ? '+' : '-') + fmt(bal);
  balEl.className = 'summary-amount ' + (bal >= 0 ? 'positive' : 'negative');

  const key = getKey();
  const fc = forecasts[key] || {};
  document.getElementById('forecastIncomeDisp').textContent = fmt(fc.income || 0);
  document.getElementById('forecastExpenseDisp').textContent = fmt(fc.expense || 0);

  // 予算超過チェック
  const budgetAlert = document.getElementById('budgetAlert');
  if ((fc.expense || 0) > 0 && expense > (fc.expense || 0)) {
    budgetAlert.classList.add('show');
    budgetAlert.textContent = `⚠️ 支出予定 ${fmt(fc.expense)} を ${fmt(expense - fc.expense)} 超過しています！`;
  } else {
    budgetAlert.classList.remove('show');
  }

  // カテゴリー別サマリー
  updateCategorySummary(list);
  // グラフ
  updateChart(list);
  // カテゴリーリスト
  renderCategoryList(list);
  // カレンダー
  renderCalendar();
}

function updateCategorySummary(list) {
  const cats = {};
  list.forEach(r => {
    if (!cats[r.catId]) cats[r.catId] = {income:0, expense:0};
    if (r.type === 'income') cats[r.catId].income += r.amount;
    else cats[r.catId].expense += r.amount;
  });
  let html = '';
  CATEGORIES.forEach(cat => {
    const d = cats[cat.id];
    if (!d) return;
    if (d.income > 0) {
      html += `<div class="ms-row"><span class="ms-cat">${cat.icon} ${cat.name}</span><span class="ms-amt-income">+${fmt(d.income)}</span></div>`;
    }
    if (d.expense > 0) {
      html += `<div class="ms-row"><span class="ms-cat">${cat.icon} ${cat.name}</span><span class="ms-amt-expense">-${fmt(d.expense)}</span></div>`;
    }
  });
  document.getElementById('categorySummary').innerHTML = html || '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:8px;">データがありません</div>';
}

function updateChart(list) {
  const cats = {};
  let maxAmt = 0;
  list.filter(r=>r.type==='expense').forEach(r => {
    cats[r.catId] = (cats[r.catId]||0) + r.amount;
    if (cats[r.catId] > maxAmt) maxAmt = cats[r.catId];
  });
  let html = '';
  const colors = ['#f8a0b0','#a0c8f8','#a0e8b0','#f8d080','#c0a8f8','#f8a870','#a0f8d8'];
  let ci = 0;
  CATEGORIES.filter(c=>c.type==='expense'||c.type==='both').forEach(cat => {
    const amt = cats[cat.id] || 0;
    if (!amt) return;
    const pct = maxAmt > 0 ? (amt / maxAmt * 100).toFixed(1) : 0;
    html += `<div class="chart-row">
      <span class="chart-label">${cat.icon}${cat.name}</span>
      <div class="chart-bar-wrap"><div class="chart-bar" style="width:${pct}%;background:${colors[ci%colors.length]};"></div></div>
      <span class="chart-val">${fmt(amt)}</span>
    </div>`;
    ci++;
  });
  document.getElementById('expenseChart').innerHTML = html || '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:8px;">データがありません</div>';
}

// ===== カテゴリーリスト描画 =====
function renderCategoryList(list) {
  const bycat = {};
  list.forEach(r => {
    if (!bycat[r.catId]) bycat[r.catId] = [];
    bycat[r.catId].push(r);
  });
  let html = '';
  CATEGORIES.forEach(cat => {
    const items = bycat[cat.id] || [];
    const total = items.reduce((s,r) => s + (r.type==='income'?r.amount:-r.amount), 0);
    const totalExpense = items.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const totalIncome = items.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const isIncomeCat = cat.type === 'income';
    html += `<div class="category-section">
      <div class="cat-header" onclick="toggleCat('cat_${cat.id}')">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-total ${isIncomeCat?'income-cat':''}">${isIncomeCat?'+'+fmt(totalIncome):fmt(totalExpense)}</span>
        <span class="cat-toggle" id="toggle_cat_${cat.id}">▼</span>
      </div>
      <div class="cat-body" id="cat_${cat.id}">
        <div class="cat-items" id="items_${cat.id}">`;
    items.sort((a,b)=>a.date.localeCompare(b.date)).forEach(r => {
      const d = r.date.split('-');
      html += `<div class="item-row" id="item_${r.id}">
        <span class="item-date">${d[2]}日</span>
        <div class="item-info">
          <div class="item-name">${r.name}</div>
          ${r.memo?`<div class="item-memo">📝 ${r.memo}</div>`:''}
        </div>
        <span class="item-amount ${r.type==='income'?'income-item':''}">${r.type==='income'?'+':'-'}${fmt(r.amount)}</span>
        <div class="item-actions">
          <button class="item-btn" onclick="editItem('${r.id}')" title="編集">✏️</button>
          <button class="item-btn" onclick="deleteItem('${r.id}')" title="削除">🗑️</button>
        </div>
      </div>`;
    });
    html += `</div>
        <button class="add-item-btn" onclick="openAddModal('${cat.id}')">＋ ${cat.name}を追加</button>
      </div>
    </div>`;
  });
  document.getElementById('categoryList').innerHTML = html;
}

function toggleCat(id) {
  const body = document.getElementById(id);
  const toggle = document.getElementById('toggle_' + id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ===== カレンダー描画 =====
function renderCalendar() {
  const list = getRecords();
  // 日別集計
  const byDay = {};
  list.forEach(r => {
    const day = r.date.split('-')[2];
    if (!byDay[day]) byDay[day] = {income:0, expense:0};
    if (r.type==='income') byDay[day].income += r.amount;
    else byDay[day].expense += r.amount;
  });

  const first = new Date(currentYear, currentMonth, 1);
  const last = new Date(currentYear, currentMonth+1, 0);
  const today = new Date();
  let html = '';

  // 前月の日を埋める
  for (let i = 0; i < first.getDay(); i++) {
    const d = new Date(currentYear, currentMonth, 1 - (first.getDay()-i));
    html += `<div class="cal-day other-month"><div class="day-num">${d.getDate()}</div></div>`;
  }

  // 当月
  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = byDay[String(d).padStart(2,'0')];
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
    const isSel = selectedDay === d;
    let cls = 'cal-day';
    if (dow===0) cls += ' sun';
    if (dow===6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    let amtHtml = '';
    if (dayData) {
      if (dayData.income>0) amtHtml += `<div class="day-income">+${(dayData.income/1000).toFixed(1)}k</div>`;
      if (dayData.expense>0) amtHtml += `<div class="day-expense">-${(dayData.expense/1000).toFixed(1)}k</div>`;
    }
    html += `<div class="${cls}" onclick="selectDay(${d})">
      <div class="day-num">${d}</div>
      <div class="day-amounts">${amtHtml}</div>
    </div>`;
  }

  // 翌月
  const remaining = (7 - (last.getDay()+1)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('monthLabel').textContent = `${currentYear}年${currentMonth+1}月`;
}

function selectDay(d) {
  selectedDay = d;
  renderCalendar();
  // 日付を設定してモーダルを開く
  openAddModal(null, d);
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  selectedDay = null;
  loadMonthForecast();
  loadMonthSaving();
  updateSummary();
}

}

let editingId = null;
function openAddModal(preCatId=null, preDay=null) {
  editingId = null;
  currentStep = 1;
  selectedType = null;
  selectedCatId = preCatId;
  amountStr = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('amountDisplay').textContent = '¥0';
  document.getElementById('customItemInput').style.display = 'none';
  document.getElementById('customItemInput').value = '';

  if (preDay) selectedDay = preDay;

  document.getElementById('addModalTitle').textContent = selectedDay
    ? `🌸 ${currentMonth+1}/${selectedDay} の収支を追加`
    : '🌸 収支を追加';

  // ステップ表示
  showStep(1);

  // カテゴリーグリッド構築
  buildCatGrid();

  if (preCatId) {
    // カテゴリーから開いた場合は収支選択→そのカテゴリーへ
    const cat = CATEGORIES.find(c=>c.id===preCatId);
    if (cat && cat.type !== 'both') {
      selectedType = cat.type;
      showStep(2);
      selectCat(preCatId);
    }
  }

  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  editingId = null;
}
function showStep(n) {
  currentStep = n;
  document.getElementById('step1').style.display = n===1?'block':'none';
  document.getElementById('step2').style.display = n===2?'block':'none';
  document.getElementById('step3').style.display = n===3?'block':'none';
}
function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.${type}-btn`).classList.add('active');
  showStep(2);
}
function buildCatGrid() {
  const grid = document.getElementById('catSelectGrid');
  let html = '';
  CATEGORIES.forEach(cat => {
    html += `<button class="cat-select-btn" id="catbtn_${cat.id}" onclick="selectCat('${cat.id}')">
      <span class="cat-select-icon">${cat.icon}</span>${cat.name}
    </button>`;
  });
  grid.innerHTML = html;
}
function selectCat(id) {
  selectedCatId = id;
  document.querySelectorAll('.cat-select-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('catbtn_'+id);
  if (btn) btn.classList.add('active');
  // 項目ドロップダウン更新
  const cat = CATEGORIES.find(c=>c.id===id);
  const dd = document.getElementById('itemDropdown');
  dd.innerHTML = '<option value="">-- 選択してください --</option>';
  if (cat) {
    cat.items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item;
      opt.textContent = item;
      dd.appendChild(opt);
    });
  }
  showStep(3);
}
function handleDropdownChange() {
  const val = document.getElementById('itemDropdown').value;
  const ci = document.getElementById('customItemInput');
  if (val === 'その他') {
    ci.style.display = 'block';
    ci.focus();
  } else {
    ci.style.display = 'none';
    ci.value = '';
  }
}
function numInput(n) {
  if (amountStr.length >= 8) return;
  amountStr += n;
  updateAmountDisplay();
}
function numDelete() {
  amountStr = amountStr.slice(0,-1);
  updateAmountDisplay();
}
function updateAmountDisplay() {
  const n = parseInt(amountStr) || 0;
  document.getElementById('amountDisplay').textContent = '¥' + n.toLocaleString();
}
function confirmAdd() {
  const dd = document.getElementById('itemDropdown').value;
  const ci = document.getElementById('customItemInput').value.trim();
  const itemName = dd === 'その他' ? ci : dd;
  if (!itemName) { alert('項目を選択または入力してください'); return; }
  const amount = parseInt(amountStr) || 0;
  if (amount === 0) { alert('金額を入力してください'); return; }
  const memo = document.getElementById('memoInput').value.trim();

  const day = selectedDay || new Date().getDate();
  const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  if (editingId) {
    // 編集
    let list = getRecords();
    const idx = list.findIndex(r=>r.id===editingId);
    if (idx >= 0) {
      list[idx] = {...list[idx], catId:selectedCatId, name:itemName, amount, memo, type:selectedType};
    }
    setRecords(list);
  } else {
    // 新規
    const rec = {
      id: Date.now().toString(),
      date: dateStr,
      type: selectedType,
      catId: selectedCatId,
      name: itemName,
      amount,
      memo
    };
    let list = getRecords();
    list.push(rec);
    setRecords(list);
  }

  saveData();
  updateSummary();
  closeAddModal();
}

// ===== 編集・削除 =====
function editItem(id) {
  const list = getRecords();
  const rec = list.find(r=>r.id===id);
  if (!rec) return;
  editingId = id;
  selectedType = rec.type;
  selectedCatId = rec.catId;
  amountStr = rec.amount.toString();
  selectedDay = parseInt(rec.date.split('-')[2]);

  document.getElementById('addModalTitle').textContent = '✏️ 編集';
  showStep(3);
  buildCatGrid();
  selectCat(rec.catId);
  document.getElementById('itemDropdown').value = rec.name;
  if (!document.getElementById('itemDropdown').value) {
    document.getElementById('customItemInput').style.display = 'block';
    document.getElementById('customItemInput').value = rec.name;
  }
  updateAmountDisplay();
  document.getElementById('memoInput').value = rec.memo || '';
  document.getElementById('addModal').classList.add('open');
}
function deleteItem(id) {
  if (!confirm('この項目を削除しますか？')) return;
  let list = getRecords();
  setRecords(list.filter(r=>r.id!==id));
  saveData();
  updateSummary();
}

// ===== 共有・コピー・印刷 =====
function buildTextSummary() {
  const list = getRecords();
  let income = 0, expense = 0;
  list.forEach(r => {
    if (r.type==='income') income += r.amount;
    else expense += r.amount;
  });
  let text = `🌸 家計簿 ${currentYear}年${currentMonth+1}月\n`;
  text += `収入合計: ¥${income.toLocaleString()}\n`;
  text += `支出合計: ¥${expense.toLocaleString()}\n`;
  text += `収支バランス: ¥${(income-expense).toLocaleString()}\n\n`;
  CATEGORIES.forEach(cat => {
    const items = list.filter(r=>r.catId===cat.id);
    if (!items.length) return;
    const tot = items.reduce((s,r)=>s+(r.type==='income'?r.amount:-r.amount),0);
    text += `【${cat.icon}${cat.name}】 ¥${Math.abs(tot).toLocaleString()}\n`;
    items.forEach(r=>{
      const d = r.date.split('-')[2];
      text += `  ${d}日 ${r.name}: ¥${r.amount.toLocaleString()}${r.memo?' ('+r.memo+')':''}\n`;
    });
  });
  return text;
}
function shareData() {
  const text = buildTextSummary();
  if (navigator.share) {
    navigator.share({ title: `家計簿 ${currentYear}年${currentMonth+1}月`, text });
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('クリップボードにコピーしました'));
  }
}
function copyData() {
  const text = buildTextSummary();
  navigator.clipboard.writeText(text).then(()=>alert('コピーしました！')).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('コピーしました！');
  });
}

// ===== CSV エクスポート =====
function exportCSV() {
  const list = getRecords();
  let csv = '\uFEFF日付,種別,カテゴリー,項目,金額,メモ\n';
  list.forEach(r => {
    const cat = CATEGORIES.find(c=>c.id===r.catId);
    csv += `${r.date},${r.type==='income'?'収入':'支出'},${cat?cat.name:''},${r.name},${r.amount},${r.memo||''}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kakeibo_${getKey()}.csv`;
  a.click();
}
function importCSV() { document.getElementById('importFile').click(); }
function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const lines = text.split('\n').slice(1);
      const list = [];
      lines.forEach((line,i) => {
        if (!line.trim()) return;
        const cols = line.split(',');
        if (cols.length < 5) return;
        const cat = CATEGORIES.find(c=>c.name===cols[2]) || CATEGORIES[CATEGORIES.length-1];
        list.push({
          id: Date.now()+i,
          date: cols[0],
          type: cols[1]==='収入'?'income':'expense',
          catId: cat.id,
          name: cols[3],
          amount: parseInt(cols[4])||0,
          memo: cols[5]||''
        });
      });
      setRecords([...getRecords(), ...list]);
      saveData();
      updateSummary();
      alert(`${list.length}件インポートしました`);
    } catch(e) { alert('インポートに失敗しました'); }
  };
  reader.readAsText(file, 'utf-8');
}

// ===== 先月比較 =====
function showLastMonthCompare() {
  const curList = getRecords();
  const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
  const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
  const prevKey = `${prevYear}-${String(prevMonth+1).padStart(2,'0')}`;
  const prevList = records[prevKey] || [];

  const sum = list => {
    let inc=0,exp=0;
    list.forEach(r=>{ if(r.type==='income')inc+=r.amount; else exp+=r.amount; });
    return {inc,exp};
  };
  const cur = sum(curList);
  const prev = sum(prevList);

  const html = `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:var(--bg2);">
        <th style="padding:8px;text-align:left;"></th>
        <th style="padding:8px;text-align:right;">${prevYear}/${prevMonth+1}月</th>
        <th style="padding:8px;text-align:right;">${currentYear}/${currentMonth+1}月</th>
        <th style="padding:8px;text-align:right;">差分</th>
      </tr>
      <tr>
        <td style="padding:8px;">💚収入</td>
        <td style="padding:8px;text-align:right;color:var(--income-color);">+${fmt(prev.inc)}</td>
        <td style="padding:8px;text-align:right;color:var(--income-color);">+${fmt(cur.inc)}</td>
        <td style="padding:8px;text-align:right;color:${cur.inc>=prev.inc?'var(--income-color)':'var(--expense-color)'};">
          ${cur.inc>=prev.inc?'+':'-'}${fmt(cur.inc-prev.inc)}</td>
      </tr>
      <tr style="background:var(--bg2);">
        <td style="padding:8px;">🌸支出</td>
        <td style="padding:8px;text-align:right;color:var(--expense-color);">-${fmt(prev.exp)}</td>
        <td style="padding:8px;text-align:right;color:var(--expense-color);">-${fmt(cur.exp)}</td>
        <td style="padding:8px;text-align:right;color:${cur.exp<=prev.exp?'var(--income-color)':'var(--expense-color)'};">
          ${cur.exp<=prev.exp?'-':'+'}${fmt(Math.abs(cur.exp-prev.exp))}</td>
      </tr>
    </table>`;
  document.getElementById('infoModalTitle').textContent = '📅 先月比較';
  document.getElementById('infoModalContent').innerHTML = html;
  document.getElementById('infoModal').classList.add('open');
  closeHamburger();
}
function closeInfoModal() { document.getElementById('infoModal').classList.remove('open'); }

// ===== 年間サマリー =====
function showYearSummary() {
  let html = '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  html += '<tr style="background:var(--bg2);"><th style="padding:6px;text-align:left;">月</th><th style="padding:6px;text-align:right;">収入</th><th style="padding:6px;text-align:right;">支出</th><th style="padding:6px;text-align:right;">収支</th></tr>';
  let totalInc=0,totalExp=0;
  for (let m=0;m<12;m++) {
    const key = `${currentYear}-${String(m+1).padStart(2,'0')}`;
    const list = records[key] || [];
    let inc=0,exp=0;
    list.forEach(r=>{ if(r.type==='income')inc+=r.amount; else exp+=r.amount; });
    totalInc+=inc; totalExp+=exp;
    const bal = inc-exp;
    html += `<tr style="background:${m%2===0?'white':'var(--bg2)'};">
      <td style="padding:6px;">${m+1}月</td>
      <td style="padding:6px;text-align:right;color:var(--income-color);">+${(inc/10000).toFixed(1)}万</td>
      <td style="padding:6px;text-align:right;color:var(--expense-color);">-${(exp/10000).toFixed(1)}万</td>
      <td style="padding:6px;text-align:right;color:${bal>=0?'var(--income-color)':'var(--expense-color)'};">${bal>=0?'+':'-'}${(Math.abs(bal)/10000).toFixed(1)}万</td>
    </tr>`;
  }
  html += `<tr style="font-weight:700;background:var(--primary-light);">
    <td style="padding:6px;">合計</td>
    <td style="padding:6px;text-align:right;color:var(--income-color);">+${(totalInc/10000).toFixed(1)}万</td>
    <td style="padding:6px;text-align:right;color:var(--expense-color);">-${(totalExp/10000).toFixed(1)}万</td>
    <td style="padding:6px;text-align:right;color:${totalInc-totalExp>=0?'var(--income-color)':'var(--expense-color)'};">
      ${totalInc-totalExp>=0?'+':'-'}${(Math.abs(totalInc-totalExp)/10000).toFixed(1)}万</td>
  </tr></table>`;

  document.getElementById('infoModalTitle').textContent = `📆 ${currentYear}年 年間サマリー`;
  document.getElementById('infoModalContent').innerHTML = html;
  document.getElementById('infoModal').classList.add('open');
  closeHamburger();
}

// ===== 初期化 =====
function init() {
  loadData();
  // テーマ・フォント復元
  const theme = localStorage.getItem('kakeibo_theme') || 'pink';
  const font = localStorage.getItem('kakeibo_font') || 'cute';
  document.body.setAttribute('data-theme', theme);
  document.body.setAttribute('data-font', font);
  document.querySelectorAll('.theme-btn').forEach(b=>{
    if (b.dataset.theme===theme) b.classList.add('active'); else b.classList.remove('active');
  });
  document.querySelectorAll('.font-btn').forEach(b=>{
    if (b.dataset.font===font) b.classList.add('active'); else b.classList.remove('active');
  });
  loadMonthForecast();
  loadMonthSaving();
  updateSummary();
}

init();
</script>
</body>
